<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Real-time Belgrade public transport arrivals.">

  <!-- Full-bleed on mobile web: the map renders edge-to-edge (including under
       the status bar / notch), while in-app controls keep clear of it via
       Flutter SafeArea. viewport-fit=cover exposes the safe-area insets;
       black-translucent lets content extend under the iOS status bar (X1). -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Browser & PWA chrome color: paint the mobile browser's status/URL bar
       (Android Chrome) and the installed-PWA title bar with the app's own
       surface — the sheet background — instead of the Flutter default blue
       (#0175C2), which showed as a blue strip above the map. Two values because
       the app follows the system theme (ThemeMode.system): light surface in
       light mode, the dark sheet surface (#10140f) in dark. On iOS this is a
       no-op — black-translucent (below) keeps the status bar transparent over
       the full-bleed map. -->
  <meta name="theme-color" content="#eef3f1" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#10140f" media="(prefers-color-scheme: dark)">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stiže">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Stiže</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Keep `viewport-fit=cover` alive. Flutter Web's engine rewrites the viewport
    // <meta> on startup with a fixed string that DROPS viewport-fit=cover
    // (flutter/flutter#116508), which silently switches off the iOS safe-area
    // insets — so the map stops rendering under the status bar / notch and the
    // top controls' SafeArea collapses to a 0 top inset (menu + recenter buttons
    // ride up under the notch). Re-assert cover whenever the engine strips it: a
    // MutationObserver on <head> catches the overwrite whether the engine mutates
    // the tag's content or swaps the node. The observer's own setAttribute is a
    // no-op on the next pass (cover already present), so it can't loop. Disconnect
    // a few seconds after the first frame, by when the engine has settled.
    (function () {
      function ensureCover() {
        var vp = document.querySelector('meta[name=viewport]');
        if (!vp) return;
        var c = vp.getAttribute('content') || '';
        if (c.indexOf('viewport-fit=cover') === -1) {
          vp.setAttribute('content', c + (c ? ', ' : '') + 'viewport-fit=cover');
        }
      }
      ensureCover();
      var obs = new MutationObserver(ensureCover);
      obs.observe(document.head, {
        childList: true, subtree: true, attributes: true, attributeFilter: ['content'],
      });
      window.addEventListener('flutter-first-frame', function () {
        setTimeout(function () { ensureCover(); obs.disconnect(); }, 3000);
      });
    })();
  </script>

  <!-- MapLibre GL JS: the web rendering backend for the `maplibre` Flutter plugin. -->
  <script src="https://unpkg.com/maplibre-gl@^5.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@^5.0/dist/maplibre-gl.css" rel="stylesheet"/>
  <script>
    // The `maplibre` Flutter plugin creates the GL JS map during the platform
    // view's initState — before Flutter has laid the view into its final slot —
    // so the map measures a 0-size viewport and never requests tiles until
    // something resizes it. Wrap the Map constructor to call resize() on a few
    // short timers after creation, once the real size is in place.
    (function () {
      function patch() {
        if (!(window.maplibregl && window.maplibregl.Map)) return false;
        var Orig = window.maplibregl.Map;
        if (Orig.__stizePatched) return true;
        function Patched(opts) {
          var m = new Orig(opts);
          window.__stizeMap = m;
          // A map created when its container is ALREADY sized (e.g. the SECOND
          // map in the app — the Coverage tab, created after the home map) gets
          // no size change from resize(), so maplibre never kicks its initial
          // render: it stays blank and never fires 'load' (so the Flutter
          // plugin's onStyleLoaded, and every layer added from it, is missed).
          // Force the render loop to run until the map has loaded + settled,
          // then drop back to on-demand rendering.
          m.repaint = true;
          var stopRepaint = function () { try { m.repaint = false; } catch (e) {} };
          m.once('idle', stopRepaint);
          setTimeout(stopRepaint, 25000); // fallback: never repaint forever
          // Flutter web settles the platform-view layout over a variable window
          // (sometimes several seconds), and until then GL JS won't request
          // tiles or repaint. Nudge resize() periodically until well past that
          // settle; once tiles are up, resize() is a cheap no-op. Also observe
          // the container for any later size changes.
          var ticks = 0;
          var iv = setInterval(function () {
            try { m.resize(); } catch (e) {}
            // maplibre-gl-js caches "image missing" for a symbol layer that was
            // added before its icon (added async via addImageFromWidget) reached
            // the sprite atlas, and never re-evaluates. Re-setting icon-image on
            // our own ('stg-*') symbol layers forces that re-evaluation so the
            // stop/cluster markers actually paint. A no-op once they're up.
            try {
              var st = m.getStyle();
              (st.layers || []).forEach(function (l) {
                if (l.type === 'symbol' && l.layout &&
                    typeof l.layout['icon-image'] === 'string' &&
                    l.layout['icon-image'].indexOf('stg-') === 0) {
                  m.setLayoutProperty(l.id, 'icon-image', l.layout['icon-image']);
                }
              });
            } catch (e) {}
            if (++ticks > 44) clearInterval(iv); // ~22s at 500ms
          }, 500);
          try {
            var ro = new ResizeObserver(function () { try { m.resize(); } catch (e) {} });
            ro.observe(m.getContainer());
          } catch (e) {}
          return m;
        }
        Patched.prototype = Orig.prototype;
        Object.keys(Orig).forEach(function (k) { try { Patched[k] = Orig[k]; } catch (e) {} });
        Patched.__stizePatched = true;
        window.maplibregl.Map = Patched;
        return true;
      }
      if (!patch()) {
        var iv = setInterval(function () { if (patch()) clearInterval(iv); }, 30);
        setTimeout(function () { clearInterval(iv); }, 8000);
      }
    })();
  </script>

  <style>
    /* Matches the app's own theme background so the pre-Flutter paint isn't a
       jarring white flash while CanvasKit/fonts download on a cold load. */
    html, body {
      height: 100%;
      margin: 0;
      background: #eef3f1;
    }
    /* Pin the app to the full visual viewport on iOS Safari (F3b). Without this
       the page can scroll/rubber-band and leave a strip of body background
       under the status bar, and the map doesn't fill edge-to-edge. `position:
       fixed; inset: 0` fills the viewport *including* the safe areas exposed by
       viewport-fit=cover; disabling scroll/overscroll stops the strip and the
       bounce. The map (and Flutter SafeArea for the controls) handle insets. */
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #10140f; }
    }
    #stize-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #6b7a72;
      font-size: 15px;
      /* The Flutter view paints over this splash, but it must never intercept
         input — otherwise this full-screen overlay silently eats every tap on
         the map underneath. Removed entirely once Flutter's first frame lands. */
      pointer-events: none;
    }
    @media (prefers-color-scheme: dark) {
      #stize-loading { color: #8a9992; }
    }
  </style>
</head>
<body>
  <div id="stize-loading">Loading Stiže…</div>
  <script>
    // Drop the loading splash once Flutter paints its first frame, so it never
    // lingers over the app.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('stize-loading');
      if (el) el.remove();
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
