<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stigla — Coverage — heatmap</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-badge page-badge--flag">FLAG — behind a feature flag</div>
<div class="stage">
  <div class="phone">
    <div class="screen ">
      <div class="status-bar"><div class="status-bar__time">9:41</div><div class="status-bar__icons"><svg class="icon" width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg><svg class="icon" width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 2.5c2.6 0 5 1 6.8 2.6l1.2-1.4A11 11 0 0 0 8 .5 11 11 0 0 0 0 3.7l1.2 1.4A9.4 9.4 0 0 1 8 2.5Z"/><path d="M8 6c1.4 0 2.7.5 3.7 1.4l1.2-1.4A7 7 0 0 0 8 4a7 7 0 0 0-4.9 2l1.2 1.4A5.4 5.4 0 0 1 8 6Z"/><path d="M8 9.5 10.2 7A3.4 3.4 0 0 0 8 6.2 3.4 3.4 0 0 0 5.8 7L8 9.5Z"/></svg><svg class="icon" width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="currentColor" opacity="0.5"/><rect x="2" y="2" width="17" height="9" rx="1.5" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" opacity="0.5"/></svg></div></div>
      
<div class="map-canvas"></div>

<svg class="coverage-heat" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="hot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#ffb860" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ef7b22" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8c370c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef7b22" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#8c370c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3c1804" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="200" cy="430" rx="150" ry="120" fill="url(#warm)"/>
  <ellipse cx="200" cy="410" rx="70" ry="60" fill="url(#hot)"/>
  <ellipse cx="120" cy="300" rx="90" ry="70" fill="url(#warm)"/>
  <ellipse cx="300" cy="560" rx="110" ry="90" fill="url(#warm)"/>
  <ellipse cx="285" cy="545" rx="45" ry="40" fill="url(#hot)"/>
  <ellipse cx="90" cy="620" rx="80" ry="70" fill="url(#warm)"/>
  <ellipse cx="320" cy="230" rx="70" ry="60" fill="url(#warm)"/>
</svg>

<div class="filter-chips">
  <span class="filter-chip filter-chip--selected">All</span>
  <span class="filter-chip"><span class="filter-chip__dot" style="background:var(--tram)"></span>Tram</span>
  <span class="filter-chip"><span class="filter-chip__dot" style="background:var(--trolley)"></span>Trolleybus</span>
  <span class="filter-chip"><span class="filter-chip__dot" style="background:var(--bus)"></span>Bus</span>
</div>
<div class="density-legend">
  <div class="density-legend__title">Transit density</div>
  <div class="density-legend__bar"></div>
  <div class="density-legend__labels"><span>rarer</span><span>busier</span></div>
</div>

    </div>
  </div>
  <div class="stage__caption">Transit density heatmap (behind coverage_map_show), type filter + density legend. DOM chips/legend over a static heat backdrop.</div>
</div>
</body>
</html>
