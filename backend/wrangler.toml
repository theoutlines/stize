name = "stigla-backend"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "stigla-api.theoutlines.xyz", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"

[[kv_namespaces]]
binding = "STIGLA_KV"
id = "9908db7cfc444d6692a66b2577b91288"

[[d1_databases]]
binding = "STIGLA_IDEAS_DB"
database_name = "stigla-ideas"
database_id = "fdd98e75-c0a7-4641-90c8-2706d6e70506"

# Transport-analytics history: raw arrival observations + rolled-up per-line
# metrics. Separate DB from ideas for clean rotation and blast-radius isolation.
[[d1_databases]]
binding = "STIGLA_ANALYTICS_DB"
database_name = "stigla-analytics"
database_id = "ddefde2f-57f2-429f-ace3-87d140e50020"
migrations_dir = "migrations-analytics"

[triggers]
crons = ["0 6 * * *"]

[vars]
API_VERSION = "v1"
ENVIRONMENT = "production"
# Private feedback-triage repo ("owner/name"). Non-secret; the issues:write PAT
# is set separately via `wrangler secret put GITHUB_FEEDBACK_TOKEN`. Absent token
# ⇒ feedback is stored in D1 only (no GitHub issue), never an error.
GITHUB_FEEDBACK_REPO = "theoutlines/stigla-feedback"

# --- Staging environment ----------------------------------------------------
# Deployed on demand from a feature branch (`npm run deploy:staging`). A fully
# isolated worker with its OWN KV + D1s, so it never touches production data.
# In-development feature flags default ON here (ENVIRONMENT=staging). Named
# environments don't inherit top-level bindings — everything is redefined below.
# No cron on staging (aggregation via the admin endpoint) to avoid extra alert
# scraping / model calls.
[env.staging]
name = "stigla-backend-staging"
# Per-branch preview versions (`npm run staging:version`) need Version Preview
# URLs on. Pin it in config so an upload doesn't reset the dashboard toggle and
# 404 the branch preview (this bit us on feature/coverage-on-main-map). Live
# staging is served via the custom domain route below.
preview_urls = true
routes = [
  { pattern = "stigla-api-staging.theoutlines.xyz", custom_domain = true }
]

[env.staging.vars]
API_VERSION = "v1"
ENVIRONMENT = "staging"
GITHUB_FEEDBACK_REPO = "theoutlines/stigla-feedback"

[env.staging.assets]
directory = "./public"
binding = "ASSETS"

[[env.staging.kv_namespaces]]
binding = "STIGLA_KV"
id = "ea2452f1112243c9a205ff616289e3e5"

[[env.staging.d1_databases]]
binding = "STIGLA_IDEAS_DB"
database_name = "stigla-ideas-staging"
database_id = "c28922ce-6233-41ea-b878-ad212723c5c6"

[[env.staging.d1_databases]]
binding = "STIGLA_ANALYTICS_DB"
database_name = "stigla-analytics-staging"
database_id = "f19648bb-8539-49af-befa-a67e54885a3b"
migrations_dir = "migrations-analytics"

# No scheduled cron on staging (override the inherited one) — avoids extra alert
# scraping / model calls. Aggregate analytics on demand via the admin endpoint.
[env.staging.triggers]
crons = []
